<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; margin: 0; padding: 24px; background: #f9fafb; }
  main { max-width: 1100px; margin: 0 auto; }
  .page-header { max-width: 1100px; margin: 0 auto 24px; }
  .page-header h1 { font-size: 24px; margin: 0 0 8px; }
  .page-header nav { margin-top: 8px; }
  .page-header nav a { color: #2563eb; text-decoration: none; }
  .text-muted { color: #6b7280; font-size: 14px; }
  .text-right { text-align: right; }
  .amount { font-variant-numeric: tabular-nums; }

  .ledger-table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .ledger-table th, .ledger-table td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; }
  .ledger-table thead th { background: #f3f4f6; font-weight: 600; }
  .ledger-table tbody tr:hover { background: #f9fafb; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-paid { background: #d1fae5; color: #065f46; }
  .badge-pending { background: #fef3c7; color: #92400e; }

  .btn-primary, .btn-secondary, .btn-ghost { display: inline-block; padding: 6px 12px; font-size: 14px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; text-decoration: none; font-family: inherit; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #fff; color: #2563eb; border-color: #2563eb; }
  .btn-secondary:hover { background: #eff6ff; }
  .btn-ghost { background: transparent; color: #6b7280; }
  .btn-ghost:hover { color: #1f2937; }

  form { display: inline; }
  .ledger-table form { margin-left: 4px; }

  .vertical-form { display: flex; flex-direction: column; gap: 20px; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .vertical-form fieldset { border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px; }
  .vertical-form legend { font-weight: 600; padding: 0 8px; }
  .vertical-form label { display: block; margin-bottom: 12px; font-size: 14px; }
  .vertical-form input[type="text"], .vertical-form input[type="number"], .vertical-form input[type="date"], .vertical-form textarea {
    display: block; width: 100%; box-sizing: border-box; padding: 8px 10px; margin-top: 4px;
    border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  .ligne-prestation { display: grid; grid-template-columns: 3fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .ligne-prestation input { margin-top: 0; }
  .form-actions { display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
</style>
